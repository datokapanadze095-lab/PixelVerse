<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVerse - ჩემი პროფილი</title>
    <link rel="stylesheet" href="site.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-family: sans-serif;
        }
        .profile-container h2 { border-bottom: 2px solid #00bcd4; padding-bottom: 10px; margin-bottom: 20px; }
        .user-info p { font-size: 1.1em; margin: 10px 0; }
        .user-info span { color: #00bcd4; font-weight: bold; }
        .logout-btn { background-color: #ef4444; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; }
        .games-window { background: #0f172a; padding: 20px; border-radius: 8px; border: 1px solid #334155; margin-top: 25px; }
        .game-item { background: #1e293b; padding: 12px; margin: 8px 0; border-radius: 6px; display: flex; justify-content: space-between; border-left: 4px solid #475569; }
        .game-item.owned { border-left: 4px solid #4ade80; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Pixel<span>Verse</span></div>
        <nav>
            <ul>
                <li><a href="site.html">მთავარი</a></li>
                <li><a href="register.html">რეგისტრაცია</a></li>
                <li><a href="games.html">თამაშების მონიშვნა</a></li>
                <li><a href="profaile.html" class="active">ჩემი პროფილი</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="profile-container">
            <h2>👤 ჩემი პროფილი</h2>
            <div class="user-info">
                <p><strong>მომხმარებელი:</strong> <span id="profileUsername"></span></p>
                <p><strong>ელ-ფოსტა:</strong> <span id="profileEmail"></span></p>
                <button class="logout-btn" onclick="logoutUser()">სისტემიდან გამოსვლა 🚪</button>
            </div>

            <div class="games-window">
                <h3>🎮 ჩემი თამაშების სტატუსი</h3>
                <div id="gamesList">
                    <div class="game-item" id="p-Minecraft"><span>Minecraft</span><span id="s-Minecraft">❌ არ გაქვთ</span></div>
                    <div class="game-item" id="p-Fortnite"><span>Fortnite</span><span id="s-Fortnite">❌ არ გაქვთ</span></div>
                    <div class="game-item" id="p-GTAV"><span>Grand Theft Auto V</span><span id="s-GTAV">❌ არ გაქვთ</span></div>
                    <div class="game-item" id="p-Roblox"><span>Roblox</span><span id="s-Roblox">❌ არ გაქვთ</span></div>
                    <div class="game-item" id="p-CS2"><span>Counter-Strike 2</span><span id="s-CS2">❌ არ გაქვთ</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. დაცვის მექანიზმი: თუ რეგისტრაცია არ არის, გადამისამართება
        if (!localStorage.getItem("isRegistered")) {
            alert("თქვენ არ ხართ რეგისტრირებული! გთხოვთ გაიაროთ რეგისტრაცია.");
            window.location.href = "register.html";
        }

        // 2. მონაცემების გამოტანა
        let userEmail = localStorage.getItem("userEmail") || "gamer@example.com";
        document.getElementById("profileUsername").innerText = userEmail.split('@')[0];
        document.getElementById("profileEmail").innerText = userEmail;

        // 3. თამაშების სტატუსი
        let myGames = JSON.parse(localStorage.getItem("myGames")) || [];
        function showAsOwned(gameId) {
            let row = document.getElementById("p-" + gameId);
            let status = document.getElementById("s-" + gameId);
            if(row && status) {
                row.classList.add("owned");
                status.innerText = "✅ გაქვთ";
                status.style.color = "#4ade80";
            }
        }

        myGames.forEach(game => {
            // შედარებისთვის: თუ გვაქვს თამაშები, ვანიჭებთ სტილს
            if(game === "Minecraft") showAsOwned("Minecraft");
            if(game === "Fortnite") showAsOwned("Fortnite");
            if(game === "GTA V") showAsOwned("GTAV");
            if(game === "Roblox") showAsOwned("Roblox");
            if(game === "CS2") showAsOwned("CS2");
        });

        // 4. Log Out ფუნქცია
        function logoutUser() {
            localStorage.clear();
            alert("თქვენ გამოხვედით სისტემიდან!");
            window.location.href = "site.html";
        }
    </script>
</body>
</html>
