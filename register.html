<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVerse - რეგისტრაცია</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* რეგისტრაციისთვის სპეციალური სტილი */
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>

<header>
        <div class="logo">Pixel<span>Verse</span></div>
        <nav>
            <ul>
                <li><a href="site.html" >მთავარი</a></li>
                <li><a href="register.html" class="active">რეგისტრაცია</a></li>
                <li><a href="games.html" >თამაშების მონიშვნა</a></li>
                <li><a href="profile.html">ჩემი პროფილი</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <h2>რეგისტრაცია</h2>
        <form id="regForm">
            <input type="email" id="email" placeholder="შეიყვანეთ ელ.ფოსტა" required>
            <input type="password" placeholder="პაროლი" required>
            <button type="submit" class="buy-btn">რეგისტრაცია 🚀</button>
        </form>
    </div>

    <script>
        document.getElementById("regForm").addEventListener("submit", function(e) {
            e.preventDefault();
            // რეგისტრაციის ლოგიკა
            localStorage.setItem("isRegistered", "true");
            localStorage.setItem("userEmail", document.getElementById("email").value);
            localStorage.setItem("purchaseHistory", JSON.stringify([]));

            alert('მოგესალმებით PixelVerse-ში! 🎮');
            window.location.href = "site.html";
        });
    </script>
   <footer>
        <p>&copy; 2026 PixelVerse Gaming. ყველა უფლება დაცულია.</p>
   </footer>

</body>
</html>
<link rel="stylesheet" href="site.css">
